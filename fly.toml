# fly.toml app configuration file generated for delulureel-autumn-sea-3375 on 2026-05-01T11:23:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'delulureel-autumn-sea-3375'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  APP_BASE_URL = 'https://delulureel.com'
  DAILY_BUDGET_CAP_USD = '200'
  FFMPEG_PATH = '/usr/bin/ffmpeg'
  FLASK_ENV = 'production'
  MAX_CONCURRENT_GLOBAL = '10'
  PORT = '8080'
  SUPABASE_URL = 'https://iauotqpmxsapjflnlrgn.supabase.co'
  TRIAL_MAX_GENERATIONS = '3'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 256

[[statics]]
  guest_path = '/app/static'
  url_prefix = '/static'
