name: Build RunPod download-helper

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: lower
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-worker/download-helper
          push: true
          tags: ghcr.io/${{ steps.lower.outputs.owner }}/download-helper:latest

      - name: Also push to ttl.sh (public anonymous registry, 24h TTL)
        # ttl.sh non richiede login — immagine pubblica e pullabile subito da RunPod
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-worker/download-helper
          push: true
          tags: ttl.sh/${{ steps.lower.outputs.owner }}/download-helper:24h

      - name: Output pull URLs
        run: |
          echo "=== IMAGE URLS ==="
          echo "GHCR (privata): ghcr.io/${{ steps.lower.outputs.owner }}/download-helper:latest"
          echo "ttl.sh (pubblica, scade 24h): ttl.sh/${{ steps.lower.outputs.owner }}/download-helper:24h"
          echo ""
          echo "Usa ttl.sh per RunPod se GHCR è ancora privata."
          echo "Per rendere GHCR pubblica permanentemente:"
          echo "https://github.com/${{ github.repository_owner }}?tab=packages → download-helper → Package settings → Change visibility → Public"

      - name: Try to set GHCR package to public (needs write:packages PAT)
        run: |
          sleep 5
          gh api -X PATCH \
            /user/packages/container/download-helper \
            --field visibility=public \
            && echo "GHCR package ora pubblico" \
            || echo "GHCR package resta privato — usa ttl.sh per il download immediato"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
