name: Build RunPod download-helper

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: lower
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push download-helper
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-worker/download-helper
          push: true
          tags: ghcr.io/${{ steps.lower.outputs.owner }}/download-helper:latest

      - name: Set package visibility to public
        run: |
          sleep 5
          gh api -X PATCH \
            /orgs/${{ github.repository_owner }}/packages/container/download-helper \
            --field visibility=public \
            && echo "Package set to public" \
            || echo "Visibility not changed — set manually from GitHub Packages"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
