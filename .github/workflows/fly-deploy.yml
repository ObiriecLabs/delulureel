name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy DELULUREEL
    runs-on: ubuntu-latest
    concurrency: deploy-group   # Evita deploy simultanei
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app delulureel
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
