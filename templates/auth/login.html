<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('auth.login_title') }} — DELULUREEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
  <a href="/" class="logo grad-text auth-logo">DELULUREEL</a>

  <form action="/set-lang" method="POST" class="lang-switcher lang-switcher-auth">
    <select name="lang" onchange="this.form.submit()" aria-label="Language">
      {% for code in SUPPORTED_LANGS %}
      <option value="{{ code }}"{% if code == lang %} selected{% endif %}>{{ LANG_NAMES[code] }}</option>
      {% endfor %}
    </select>
  </form>

  <div class="auth-card">
    <h1 class="auth-title">{{ t('auth.login_title') }}</h1>
    <p class="auth-sub">{{ t('auth.login_sub') }}</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login" class="auth-form" id="login-form">
      <div class="field">
        <label class="field-label">{{ t('auth.email_label') }}</label>
        <input type="email" name="email" class="field-input" placeholder="you@example.com" required autofocus>
      </div>
      <div class="field">
        <label class="field-label">{{ t('auth.password_label') }}</label>
        <input type="password" name="password" class="field-input" placeholder="••••••••" required>
      </div>
      <div class="field-forgot">
        <a href="/auth/forgot-password" class="auth-link-sm">{{ t('auth.forgot_password') }}</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        {{ t('auth.login_btn') }}
      </button>
    </form>

    <p class="auth-switch">
      {{ t('auth.no_account') }}
      <a href="/auth/signup" class="auth-link">{{ t('auth.signup_link') }}</a>
    </p>
  </div>
</div>

<script>
  const _loggingIn = {{ t('auth.logging_in') | tojson }};
  document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = _loggingIn;
  });
</script>
</body>
</html>
