<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — DELULUREEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
  <a href="/" class="logo grad-text auth-logo">DELULUREEL</a>

  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to your account</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login" class="auth-form" id="login-form">
      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" name="email" class="field-input" placeholder="you@example.com" required autofocus>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" name="password" class="field-input" placeholder="••••••••" required>
      </div>
      <div class="field-forgot">
        <a href="/auth/forgot-password" class="auth-link-sm">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        Log in →
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="/auth/signup" class="auth-link">Start free trial</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Logging in…';
  });
</script>
</body>
</html>
