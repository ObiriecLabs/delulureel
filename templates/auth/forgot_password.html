<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('auth.forgot_title') }} — DELULUREEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
  <a href="/" class="logo grad-text auth-logo">DELULUREEL</a>

  <form action="/set-lang" method="POST" class="lang-switcher lang-switcher-auth">
    <select name="lang" onchange="this.form.submit()" aria-label="Language">
      {% for code in SUPPORTED_LANGS %}
      <option value="{{ code }}"{% if code == lang %} selected{% endif %}>{{ LANG_NAMES[code] }}</option>
      {% endfor %}
    </select>
  </form>

  <div class="auth-card">
    {% if sent %}
      <h1 class="auth-title">{{ t('auth.sent_title') }}</h1>
      <p class="auth-sub">{{ t('auth.sent_sub') | replace('{email}', email) }}</p>
      <a href="/auth/login" class="btn btn-primary btn-full" style="margin-top:24px">{{ t('auth.back_to_login') }}</a>
    {% else %}
      <h1 class="auth-title">{{ t('auth.forgot_title') }}</h1>
      <p class="auth-sub">{{ t('auth.forgot_sub') }}</p>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth/forgot-password" class="auth-form" id="fp-form">
        <div class="field">
          <label class="field-label">{{ t('auth.email_label') }}</label>
          <input type="email" name="email" class="field-input" placeholder="you@example.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="fp-btn">
          {{ t('auth.send_btn') }}
        </button>
      </form>

      <p class="auth-switch">
        <a href="/auth/login" class="auth-link">{{ t('auth.back_to_login_arrow') }}</a>
      </p>
    {% endif %}
  </div>
</div>

<script>
  const _sending = {{ t('auth.sending') | tojson }};
  const form = document.getElementById('fp-form');
  if (form) {
    form.addEventListener('submit', function() {
      const btn = document.getElementById('fp-btn');
      btn.disabled = true;
      btn.textContent = _sending;
    });
  }
</script>
</body>
</html>
