<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your inbox — DELULUREEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .confirm-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 100%;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    .logo { font-size: 1.3rem; font-weight: 800; background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; display: block; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: var(--text-muted); line-height: 1.7; font-size: 0.95rem; }
    .email-badge {
      display: inline-block;
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.3);
      color: #a78bfa;
      border-radius: 0.5rem;
      padding: 0.3rem 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0.5rem 0 1.25rem;
    }
    .note {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .back-link { margin-top: 1.5rem; display: block; font-size: 0.85rem; color: var(--text-muted); }
    .back-link a { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="confirm-wrap">
    <div class="confirm-card">
      <span class="logo">DELULUREEL</span>
      <div class="icon">📬</div>
      <h1>Check your inbox</h1>
      <p>We sent a confirmation link to</p>
      <div class="email-badge">{{ email }}</div>
      <p>Click the link in the email to confirm your account and start your 7-day free trial.</p>
      <p class="note">Can't find it? Check your spam folder. The link expires in 24 hours.</p>
      <span class="back-link">Already confirmed? <a href="/auth/login">Log in →</a></span>
    </div>
  </div>
</body>
</html>
