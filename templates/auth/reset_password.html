<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('auth.reset_title') }} — DELULUREEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
  <a href="/" class="logo grad-text auth-logo">DELULUREEL</a>

  <form action="/set-lang" method="POST" class="lang-switcher lang-switcher-auth">
    <select name="lang" onchange="this.form.submit()" aria-label="Language">
      {% for code in SUPPORTED_LANGS %}
      <option value="{{ code }}"{% if code == lang %} selected{% endif %}>{{ LANG_NAMES[code] }}</option>
      {% endfor %}
    </select>
  </form>

  <div class="auth-card">
    {% if success %}
      <h1 class="auth-title">{{ t('auth.updated_title') }}</h1>
      <p class="auth-sub">{{ t('auth.updated_sub') }}</p>
      <a href="/auth/login" class="btn btn-primary btn-full" style="margin-top:24px">{{ t('auth.login_btn') }}</a>
    {% else %}
      <h1 class="auth-title">{{ t('auth.reset_title') }}</h1>
      <p class="auth-sub">{{ t('auth.reset_sub') }}</p>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth/reset-password" class="auth-form" id="rp-form">
        <input type="hidden" name="access_token" value="{{ access_token }}">
        <div class="field">
          <label class="field-label">{{ t('auth.new_password') }}</label>
          <input type="password" name="password" class="field-input" placeholder="••••••••" required minlength="8" autofocus>
        </div>
        <div class="field">
          <label class="field-label">{{ t('auth.confirm_new') }}</label>
          <input type="password" name="confirm" class="field-input" id="rp-confirm" placeholder="••••••••" required minlength="8">
          <p id="rp-mismatch-msg" style="display:none;margin-top:6px;font-size:13px;color:#ff5a87;"></p>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="rp-btn">
          {{ t('auth.update_btn') }}
        </button>
      </form>
    {% endif %}
  </div>
</div>

<style>
  .field-input-error { border-color: #ff5a87 !important; }
</style>
<script>
  const _pwMismatch  = {{ t('auth.passwords_mismatch') | tojson }};
  const _updating    = {{ t('auth.updating')           | tojson }};

  // Supabase sends access_token in the URL fragment (#access_token=...).
  // Fragments are never sent to the server, so the route renders the page with
  // an empty token. This IIFE extracts it client-side and populates the hidden
  // field before the user submits the form.
  (function() {
    var hash = window.location.hash.substring(1);
    if (!hash) return;
    var params = new URLSearchParams(hash);
    var token = params.get('access_token');
    if (token) {
      var field = document.querySelector('input[name="access_token"]');
      if (field) {
        field.value = token;
        window.history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

  var form         = document.getElementById('rp-form');
  var confirmInput = document.getElementById('rp-confirm');
  var mismatchMsg  = document.getElementById('rp-mismatch-msg');

  function checkMatch() {
    var pw  = form.querySelector('[name=password]').value;
    var cfm = confirmInput.value;
    if (cfm && pw !== cfm) {
      mismatchMsg.textContent = _pwMismatch;
      mismatchMsg.style.display = 'block';
      confirmInput.classList.add('field-input-error');
    } else {
      mismatchMsg.style.display = 'none';
      confirmInput.classList.remove('field-input-error');
    }
  }

  if (confirmInput && mismatchMsg) {
    confirmInput.addEventListener('input', checkMatch);
  }

  if (form) {
    form.addEventListener('submit', function(e) {
      var pw  = form.querySelector('[name=password]').value;
      var cfm = confirmInput ? confirmInput.value : form.querySelector('[name=confirm]').value;
      if (pw !== cfm) {
        e.preventDefault();
        checkMatch();
        if (confirmInput) confirmInput.focus();
        return;
      }
      var btn = document.getElementById('rp-btn');
      btn.disabled = true;
      btn.textContent = _updating;
    });
  }
</script>
</body>
</html>
