<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DELULUREEL{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="app-nav">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="logo grad-text">DELULUREEL</a>
      <div class="nav-right">
        {% block nav_extra %}{% endblock %}
        <form action="/set-lang" method="POST" class="lang-switcher">
          <select name="lang" onchange="this.form.submit()" aria-label="Language">
            {% for code in SUPPORTED_LANGS %}
            <option value="{{ code }}"{% if code == lang %} selected{% endif %}>{{ LANG_NAMES[code] }}</option>
            {% endfor %}
          </select>
        </form>
        <a href="/auth/logout" class="nav-logout">{{ t('nav.logout') }}</a>
      </div>
    </div>
  </div>
</nav>

<main class="app-main">
  {% block content %}{% endblock %}
</main>

<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
