services:
  - type: web
    name: delulureel
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_server:app --workers 1 --threads 8 --timeout 300 --worker-class gthread --max-requests 500 --max-requests-jitter 50
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FAL_KEY
        sync: false
      - key: SUPABASE_URL
        value: "https://iauotqpmxsapjflnlrgn.supabase.co"
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BYOC_MONTHLY
        sync: false
      - key: STRIPE_PRICE_BYOC_ANNUAL
        sync: false
      - key: STRIPE_PRICE_CREATOR_MONTHLY
        sync: false
      - key: STRIPE_PRICE_CREATOR_ANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: STRIPE_PRICE_STUDIO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STUDIO_ANNUAL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FFMPEG_PATH
        value: /usr/bin/ffmpeg
      - key: APP_BASE_URL
        value: "https://delulureel.com"
      - key: DAILY_BUDGET_CAP_USD
        value: "200"
      - key: MAX_CONCURRENT_GLOBAL
        value: "10"
      - key: TRIAL_MAX_CREDITS
        value: "6"
      - key: COST_MARGIN_MULTIPLIER
        value: "2.5"
